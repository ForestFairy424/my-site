<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理者ページ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #111;
      color: #00ffcc;
      font-family: 'Noto Sans JP', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }
    h1 { font-size: 40px; margin-bottom: 20px; }
    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      cursor: pointer;
    }
    button:hover { background: #00ccaa; }
  </style>
</head>
<body>

  <h1>管理者ページへようこそ</h1>
  <p>ここに管理者用の操作ボタンや情報を配置できます。</p>
  
  <button onclick="alert('ここに管理者操作を追加')">テストボタン</button>

</body>
</html>
